<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
<title>PudúChat — Colmena Distribuida v7</title>

<style>
/* ── BACKGROUNDS & THREE.JS CANVAS (Z-INDEX LAYERING FIX) ── */
#bg-img {
  position: fixed; inset: 0; z-index: 0;
  background: url('https://media-cldnry.s-nbcnews.com/image/upload/t_social_share_1024x768_scale,f_auto,q_auto:best/rockcms/2024-11/Pudu-Argentina-207469.jpg') center/cover no-repeat;
  filter: blur(3px) saturate(1.4) brightness(0.65);
  transform: scale(1.04);
}
#bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(to bottom, rgba(5,8,20,0.5) 0%, rgba(15,10,30,0.3) 40%, rgba(5,8,20,0.6) 100%);
  pointer-events: none;
}
#three-canvas {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
}
#msg3d {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
}
#text3d-canvas {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
}

/* ── PUDÚ 3D OVERLAY ── */
#pudu3d-overlay {
  position: fixed; inset: 0; z-index: 500; pointer-events: none;
  overflow: hidden; display: none;
}
#pudu3d-canvas {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none !important; /* CRÍTICO: Previene que bloquee el input */
}
#pudu3d-caption {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  font-family: 'Fredoka One', cursive; font-size: clamp(18px, 4vw, 32px); letter-spacing: 2px;
  color: #fff; text-shadow: 0 0 20px #00e5ff, 0 0 40px #b16bff, 2px 2px 0 #000;
  white-space: pre-wrap; text-align: center; max-width: 90vw; opacity: 0; pointer-events: none;
}
#pudu3d-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(5, 8, 20, 0.7) 100%);
  opacity: 0; pointer-events: none; transition: opacity 0.4s;
}

/* ── BASE UI STYLES ── */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; background: #050814; }
:root {
  --primary: #00e5ff;
  --primary-dark: #0072ff;
  --secondary: #b16bff;
  --accent: #4ade80;
  --gold: #ffd700;
  --bg-dark: rgba(10, 14, 25, 0.88);
  --bubble-me: linear-gradient(135deg, #0072ff 0%, #00e5ff 100%);
  --bubble-other: rgba(20, 24, 40, 0.95);
  --sidebar-w: 280px;
  --font-title: 'Fredoka One', cursive;
  --font-body: 'Nunito', sans-serif;
}
.screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity .5s, transform .5s; }
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

/* ── WELCOME & CONNECTING SCREENS ── */
#welcome-screen, #connecting-screen { padding: 20px; }
.welcome-card, .connecting-card {
  background: var(--bg-dark); border: 2px solid var(--primary); border-radius: 20px;
  padding: 32px 26px 34px; max-width: 400px; width: 100%;
  backdrop-filter: blur(24px);
  box-shadow: 0 0 40px rgba(0,229,255,.2), 0 0 80px rgba(177,107,255,.15), inset 0 1px 0 rgba(255,255,255,.1);
  text-align: center; position: relative; overflow: hidden;
}
.title-iron {
  font-family: var(--font-title); font-size: clamp(32px,7vw,42px); letter-spacing: 4px;
  background: linear-gradient(135deg, #00e5ff 0%, #b16bff 50%, #ffd700 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  display: block; filter: drop-shadow(0 2px 10px rgba(0,229,255,.4));
}
.title-sub { font-weight: 800; font-size: 11px; letter-spacing: 3px; color: rgba(0,229,255,.7); text-transform: uppercase; margin-top: 6px; }
.mode-btn { width: 100%; padding: 16px; margin-top: 12px; border-radius: 12px; border: 2px solid rgba(0,229,255,.5); background: rgba(0,229,255,.1); color: #fff; font-family: var(--font-title); cursor: pointer; transition: all .2s; }
.mode-btn:hover { background: rgba(0,229,255,.3); transform: translateY(-2px); }
.dots span { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 5px; animation: dotBounce 1s infinite; background: var(--primary); }
.dots span:nth-child(2) { animation-delay: .2s; background: var(--secondary); }
.dots span:nth-child(3) { animation-delay: .4s; background: var(--accent); }
@keyframes dotBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

/* ── CHAT SCREEN ── */
#chat-screen { flex-direction: row; justify-content: flex-start; align-items: stretch; padding: 0; }
#rooms-sidebar {
  width: var(--sidebar-w); flex-shrink: 0; background: rgba(10,14,25,.95);
  border-right: 1px solid rgba(0,229,255,.15); display: flex; flex-direction: column;
  z-index: 25; backdrop-filter: blur(28px); transition: transform .3s;
}
.sidebar-header { padding: 16px; border-bottom: 1px solid rgba(0,229,255,.1); }
.sidebar-title { font-family: var(--font-title); font-size: 18px; color: var(--primary); }
.sidebar-rooms { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.room-card { padding: 12px; border-radius: 12px; border: 1px solid rgba(0,229,255,.1); background: rgba(0,229,255,.03); cursor: pointer; transition: all .2s; }
.room-card.active { background: rgba(0,229,255,.15); border-color: var(--primary); box-shadow: 0 0 15px rgba(0,229,255,.2); }
.room-name { font-weight: 800; font-size: 14px; color: #fff; }

/* ── CHAT AREA ── */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.chat-header {
  padding: 12px 18px; background: rgba(10,14,25,.95); border-bottom: 1px solid rgba(0,229,255,.2);
  display: flex; align-items: center; gap: 12px; backdrop-filter: blur(28px); z-index: 20;
}
.h-info { flex: 1; }
.h-room-tag { font-weight: 800; font-size: 11px; color: rgba(255,255,255,.5); text-transform: uppercase; }
.h-name { font-family: var(--font-title); font-size: 20px; color: #fff; text-shadow: 0 0 10px rgba(0,229,255,.5); }
.h-status { font-size: 12px; font-weight: 700; color: var(--accent); }
.device-tier-badge { font-family: var(--font-title); font-size: 10px; padding: 4px 8px; border-radius: 8px; border: 1px solid rgba(177,107,255,.4); background: rgba(177,107,255,.1); color: #fff; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
}
.sys-msg { text-align: center; font-family: var(--font-title); font-size: 11px; color: rgba(255,255,255,.5); text-transform: uppercase; margin: 8px 0; }
.msg-row { display: flex; flex-direction: column; max-width: 75%; animation: bubbleIn .3s ease-out; }
.msg-row.me { align-self: flex-end; align-items: flex-end; }
.msg-row.other { align-self: flex-start; align-items: flex-start; }
@keyframes bubbleIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.msg-sender { font-family: var(--font-title); font-size: 12px; margin-bottom: 4px; padding: 0 6px; color: var(--primary); text-transform: uppercase; }
.msg-row.me .msg-sender { color: rgba(255,255,255,.6); }
.msg-bubble {
  padding: 12px 18px; border-radius: 18px; font-size: 16px; font-weight: 700; line-height: 1.5; word-break: break-word;
}
.msg-row.me .msg-bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,229,255,.3); }
.msg-row.other .msg-bubble { background: var(--bubble-other); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(177,107,255,.5); }
.msg-time { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 4px; font-weight: 700; }

/* ── INPUT AREA (Z-INDEX 9999 CRÍTICO) ── */
.chat-input-area {
  position: relative; z-index: 9999 !important; background: rgba(10,14,25,.98);
  border-top: 1px solid rgba(0,229,255,.3); padding: 14px 18px; display: flex; gap: 12px; align-items: flex-end;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}
.chat-input {
  flex: 1; background: rgba(0,229,255,.08); border: 1px solid rgba(0,229,255,.4); border-radius: 16px;
  padding: 14px 20px; color: #fff; font-family: var(--font-body); font-size: 16px; font-weight: 700;
  outline: none; resize: none; max-height: 100px;
}
.chat-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,229,255,.3); }
.send-btn {
  width: 52px; height: 52px; border-radius: 16px; background: var(--bubble-me); border: none;
  color: white; font-size: 24px; cursor: pointer; transition: transform .1s; flex-shrink: 0;
}
.send-btn:active { transform: scale(0.9); }

/* ── SIMULATOR LOG ── */
#sim-log { display: none; position: fixed; bottom: 85px; left: 10px; right: 10px; z-index: 999; max-height: 40vh; overflow-y: auto; background: rgba(10,10,15,0.95); border: 1px solid var(--primary); border-radius: 12px; padding: 12px; font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.7); pointer-events: none; }
#sim-log.active { display: block; }
#sim-log .sim-pass { color: #4ade80; }
#sim-log .sim-fail { color: #ef4444; }
#sim-log .sim-info { color: #b16bff; }
#sim-log .sim-title { color: #ffd700; font-weight: 700; }

/* ── RESPONSIVE ── */
@media(max-width: 600px) {
  #rooms-sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
  #rooms-sidebar.open { transform: translateX(0); }
  .chat-header { padding-left: 50px; }
  #sidebar-toggle { position: absolute; left: 10px; top: 10px; z-index: 30; background: rgba(0,229,255,.2); border: 1px solid var(--primary); color: white; padding: 8px; border-radius: 8px; cursor: pointer; }
}
@media(min-width: 601px) { #sidebar-toggle { display: none; } }
</style>
</head>
<body>

<div id="bg-img"></div>
<div id="bg-overlay"></div>
<canvas id="three-canvas"></canvas>
<canvas id="msg3d"></canvas>
<canvas id="text3d-canvas"></canvas>

<!-- WELCOME SCREEN -->
<div class="screen" id="welcome-screen">
  <div class="welcome-card">
    <span class="title-iron">PUDÚ MENTE</span>
    <div class="title-sub">Colmena P2P Distribuida</div>
    <div style="margin: 20px 0;">
      <div style="font-size:50px; animation: dotBounce 2s infinite;">🦌</div>
    </div>
    <div style="font-weight:700; color:rgba(255,255,255,0.7); font-size:14px; margin-bottom:15px;">

<!-- CONNECTING SCREEN -->
<div class="screen hidden" id="connecting-screen">
  <div class="connecting-card">
    <span class="title-iron">CONECTANDO</span>
    <div class="dots" style="margin:20px 0;"><span></span><span></span><span></span></div>
    <div id="connecting-text" style="font-weight:700; color:rgba(255,255,255,0.7); font-size:14px;">Generando identidad...</div>
    <div id="assigned-name-display" style="color:var(--gold); font-family:var(--font-title); margin-top:10px;"></div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="screen hidden" id="chat-screen">
  <button id="sidebar-toggle" onclick="document.getElementById('rooms-sidebar').classList.toggle('open')">🌿</button>

  <div id="rooms-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">🦌 BOSQUES</span>
      <div class="sidebar-subtitle">Red mesh P2P</div>
    </div>
    <div class="sidebar-rooms" id="rooms-list"></div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div class="h-info">
        <div class="h-room-tag" id="h-room-tag">🌿 SALA 1</div>
        <div class="h-name">PUDÚ CHAT P2P</div>
        <div id="h-status" class="h-status">● conectando...</div>
      </div>
      <div class="device-tier-badge" id="device-tier-badge">TIER ?</div>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <!-- Mensajes van aquí -->
    </div>
    
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Escribe aquí... o invoca a @pudu" rows="1"></textarea>
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- PUDÚ 3D OVERLAY -->
<div id="pudu3d-overlay">
  <div id="pudu3d-vignette"></div>
  <canvas id="pudu3d-canvas"></canvas>
  <div id="pudu3d-caption"></div>
</div>

<div id="sim-log"></div>

<script type="module">
// ══════════════════════════════════════════════════════════════════════════
//  WEB WORKER & IMPORTS (From index.html v7)
// ══════════════════════════════════════════════════════════════════════════
const WORKER_CODE = `
import { WebWorkerMLCEngineHandler } from "https://esm.run/@mlc-ai/web-llm";
const handler = new WebWorkerMLCEngineHandler();
self.onmessage = (msg) => { handler.onmessage(msg); };
`;
function createWorker() {
  const blob = new Blob([WORKER_CODE], { type: "text/javascript" });
  return new Worker(URL.createObjectURL(blob), { type: "module" });
}

const _nostrPreload = import("https://esm.sh/nostr-tools@2/pure").catch(()=>null);
let nostrMod = null;
async function getNostrMod() {
  if (!nostrMod) nostrMod = await (_nostrPreload || import("https://esm.sh/nostr-tools@2/pure"));
  return nostrMod;
}

const webllm = await import("https://esm.run/@mlc-ai/web-llm");

// ══════════════════════════════════════════════════════════════════════════
//  CONFIGURATIONS & STATE
// ══════════════════════════════════════════════════════════════════════════
const CONFIG = {
  models:[
    { id: "SmolLM2-360M-Instruct-q4f16_1-MLC", name: "0.4B-q4", label: "tiny", vramMB: 350, ramMB: 500, modelSize: 360, tier: "C", roles: ["fast_router"] },
    { id: "Qwen2.5-0.5B-Instruct-q4f16_1-MLC", name: "0.5B-q4", label: "mini", vramMB: 450, ramMB: 700, modelSize: 500, tier: "C", roles: ["fast_router"] },
    { id: "Llama-3.2-1B-Instruct-q4f16_1-MLC", name: "1B-q4", label: "small", vramMB: 900, ramMB: 1200, modelSize: 1000, tier: "B", roles: ["creative", "general"] },
    { id: "Llama-3.2-3B-Instruct-q4f16_1-MLC", name: "3B-q4", label: "medium", vramMB: 2200, ramMB: 3000, modelSize: 3000, tier: "B", roles:["creative", "general"] },
  ],
  maxPeers: 12,
  nostrCoreRelays:["wss://relay.damus.io", "wss://nos.lol", "wss://offchain.pub"],
  maxActiveRelays: 3,
  appNamespace: "p2p-hive-public",
  presenceTTLMs: 45000,
};

const ROOM_CAPACITY = 15;
let roomName = 'sala-1';
const lobbyPeers = new Map();
const peers = new Map();
const relayMap = new Map();
const chatHistory =[];
const seenEventIds = new Set();
const fedPending = new Map();

let privKeyBytes = null, pubKeyHex = "", peerId = "", myNickname = "Viajero";
let deviceTier = "D", hasWebGPU = false, memoryMB = 0, availableVRAM = 0, myRole = "relay";
let engine = null, currentModelId = null, currentModelLabel = "none", localTPS = 0;
let isGenerating = false, petalsActive = false, petalsMyLayers = [];

const NICK_ANIMALS =['Pudú','Huemul','Guiña','Vizcacha','Puma','Zorro','Cóndor'];
const NICK_MAGIC = ['Camahueto','Pincoya','Trauco','Alicanto','Caleuche'];

function randomName() {
  return `${NICK_ANIMALS[Math.floor(Math.random()*NICK_ANIMALS.length)]} ${NICK_MAGIC[Math.floor(Math.random()*NICK_MAGIC.length)]}`;
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid() { return Math.random().toString(36).substr(2, 9); }

// ══════════════════════════════════════════════════════════════════════════
//  UI INTEGRATION (V12 STYLE)
// ══════════════════════════════════════════════════════════════════════════
function show(id) {['welcome-screen','connecting-screen','chat-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function updateConnectingText(txt) {
  const el = document.getElementById('connecting-text');
  if (el) el.textContent = txt;
}

function addSystemMsgVS(room, txt) {
  if (room !== roomName) return;
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = txt;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addMessageToUI(role, content, streaming = false) {
  const isUser = role === 'user';
  const c = document.getElementById('chat-messages');
  
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'me' : 'other'}`;
  
  const snd = document.createElement('div');
  snd.className = 'msg-sender msg-header';
  snd.textContent = isUser ? myNickname : 'Pudú Colmena';
  
  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'msg-body';
  bodyWrap.style.display = 'contents';
  
  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  
  if (streaming) {
     bub.innerHTML = `<span class="msg-content"></span><div class="typing-indicator" style="display:inline-block; margin-left:8px;"><span class="typing-dot" style="display:inline-block;width:6px;height:6px;background:#fff;border-radius:50%;margin:0 2px;animation:dotBounce 1s infinite"></span></div>`;
  } else {
     bub.innerHTML = `<span class="msg-content">${escapeHtml(content || '').replace(/\n/g, '<br>')}</span>`;
  }
  
  const meta = document.createElement('div');
  meta.className = 'msg-time msg-meta';
  
  bodyWrap.appendChild(bub);
  row.appendChild(snd);
  row.appendChild(bodyWrap);
  row.appendChild(meta);
  
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
  
  if (!streaming && content) {
    if (isUser) { try{ add3DText(content, true); playSendSound(); } catch(e){} }
    else { try{ add3DText(content, false); playMsgReceive(); } catch(e){} }
  }
  
  return row;
}

// ══════════════════════════════════════════════════════════════════════════
//  PUDÚ 3D AI & CINEMATIC (FROM V12)
// ══════════════════════════════════════════════════════════════════════════
let pudu3dScene, pudu3dRenderer, pudu3dCamera, pudu3dModel, pudu3dClock;
let pudu3dRunning = false, pudu3dLoaded = false, puduOnScreen = false;
let puduLeaveTimer = null;
let puduParts = {};

class PuduAI {
  constructor() {
    this.state = 'idle';
    this.stateTime = 0;
    this.tailWag = 0;
    this.speakingUntil = 0;
    this.thinkingUntil = 0;
  }
  think(dt) {
    this.stateTime += dt;
    this.tailWag = Math.max(0, this.tailWag - dt * 0.5);
  }
}
const puduBrain = new PuduAI();

function buildProceduralPudu() {
  const root = new THREE.Group();
  const P = {};
  
  const wMat = new THREE.MeshBasicMaterial({color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.85});
  const sMat = new THREE.MeshBasicMaterial({color: 0x0072ff, transparent: true, opacity: 0.15});
  
  const bodyGeo = new THREE.SphereGeometry(0.6, 10, 8);
  const body = new THREE.Group();
  body.add(new THREE.Mesh(bodyGeo, sMat));
  body.add(new THREE.Mesh(bodyGeo, wMat));
  body.scale.set(1, 0.88, 1.05);
  root.add(body);
  
  const headGroup = new THREE.Group();
  headGroup.position.set(0, 0.9, 0.5);
  root.add(headGroup);
  P.head = headGroup;
  
  const headGeo = new THREE.SphereGeometry(0.4, 10, 8);
  const headMesh = new THREE.Group();
  headMesh.add(new THREE.Mesh(headGeo, sMat));
  headMesh.add(new THREE.Mesh(headGeo, wMat));
  headGroup.add(headMesh);
  
  // Eyes
  const eyeM = new THREE.MeshBasicMaterial({color: 0xffffff});
  const eyePupM = new THREE.MeshBasicMaterial({color: 0x000000});
  const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeM);
  lEye.position.set(-0.15, 0.1, 0.35); headGroup.add(lEye);
  const rEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeM);
  rEye.position.set(0.15, 0.1, 0.35); headGroup.add(rEye);
  
  const lPup = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyePupM);
  lPup.position.set(-0.15, 0.1, 0.42); headGroup.add(lPup);
  const rPup = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyePupM);
  rPup.position.set(0.15, 0.1, 0.42); headGroup.add(rPup);
  
  // Ears
  const earM = new THREE.MeshBasicMaterial({color: 0xffd700, wireframe: true});
  const lEar = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), earM);
  lEar.position.set(-0.3, 0.3, 0); lEar.scale.set(0.5, 1.5, 0.2); lEar.rotation.z = 0.4; headGroup.add(lEar);
  P.lEar = lEar;
  const rEar = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), earM);
  rEar.position.set(0.3, 0.3, 0); rEar.scale.set(0.5, 1.5, 0.2); rEar.rotation.z = -0.4; headGroup.add(rEar);
  P.rEar = rEar;
  
  puduParts = P;
  return root;
}

async function initPudu3D() {
  if (pudu3dLoaded) return;
  const canvas = document.getElementById('pudu3d-canvas');
  pudu3dRenderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
  pudu3dRenderer.setSize(window.innerWidth, window.innerHeight);
  pudu3dScene = new THREE.Scene();
  pudu3dCamera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  pudu3dCamera.position.set(0, 1.5, 6);
  
  pudu3dModel = buildProceduralPudu();
  pudu3dScene.add(pudu3dModel);
  pudu3dClock = new THREE.Clock();
  pudu3dLoaded = true;
}

function runPudu3DLoop() {
  if (!pudu3dRunning) return;
  requestAnimationFrame(runPudu3DLoop);
  const dt = Math.min(pudu3dClock.getDelta(), 0.1);
  const t = pudu3dClock.getElapsedTime();
  
  puduBrain.think(dt);
  
  if (pudu3dModel && puduParts.head) {
    const isSpeaking = performance.now() < puduBrain.speakingUntil;
    const isThinking = performance.now() < puduBrain.thinkingUntil;
    
    // Breathing / Bobbing
    pudu3dModel.position.y = -0.2 + Math.sin(t * 2) * 0.05;
    
    // Head animation
    if (isSpeaking) {
      puduParts.head.rotation.x = Math.sin(t * 10) * 0.05;
      puduParts.lEar.rotation.z = 0.4 + Math.sin(t * 5) * 0.1;
      puduParts.rEar.rotation.z = -0.4 - Math.sin(t * 5) * 0.1;
    } else if (isThinking) {
      puduParts.head.rotation.z = Math.sin(t * 3) * 0.15;
    } else {
      puduParts.head.rotation.set(0,0,0);
    }
    
    // Run / Leave animations handled by tweening position
  }
  
  pudu3dRenderer.render(pudu3dScene, pudu3dCamera);
}

function lerp(a,b,t) { return a+(b-a)*t; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }

async function showPuduCinematic(payload) {
  if (!pudu3dLoaded) await initPudu3D();
  if (!pudu3dModel) return;

  const overlay = document.getElementById('pudu3d-overlay');
  const caption = document.getElementById('pudu3d-caption');
  const vignette = document.getElementById('pudu3d-vignette');
  
  if (!puduOnScreen) {
    puduOnScreen = true;
    overlay.style.display = 'block';
    pudu3dModel.position.set(-10, -0.2, 0);
    pudu3dRunning = true;
    pudu3dClock.start();
    runPudu3DLoop();
    
    // Arrive tween
    const start = performance.now();
    await new Promise(r => {
      function step(now) {
        const p = Math.min((now - start)/1200, 1);
        pudu3dModel.position.x = lerp(-10, 0, easeOut(p));
        if (p<1) requestAnimationFrame(step); else r();
      }
      requestAnimationFrame(step);
    });
    
    caption.style.opacity = 1;
    vignette.style.opacity = 0.7;
  }
  
  if (payload.text) {
    const cleanText = payload.text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
    caption.textContent = cleanText;
    puduBrain.thinkingUntil = 0;
    puduBrain.speakingUntil = performance.now() + 2000 + cleanText.length * 50;
    
    clearTimeout(puduLeaveTimer);
    puduLeaveTimer = setTimeout(async () => {
      caption.style.opacity = 0;
      vignette.style.opacity = 0;
      // Leave tween
      const start = performance.now();
      await new Promise(r => {
        function step(now) {
          const p = Math.min((now - start)/1000, 1);
          pudu3dModel.position.x = lerp(0, 10, p*p*p);
          if (p<1) requestAnimationFrame(step); else r();
        }
        requestAnimationFrame(step);
      });
      overlay.style.display = 'none';
      puduOnScreen = false;
      pudu3dRunning = false;
    }, Math.min(15000, 3000 + cleanText.length * 40));
    
  } else if (payload.notice) {
    caption.textContent = payload.notice;
    puduBrain.thinkingUntil = performance.now() + 15000;
    clearTimeout(puduLeaveTimer);
  }
}

async function initIdentity() {
  const nostr = await getNostrMod();
  privKeyBytes = nostr.generateSecretKey();
  pubKeyHex = nostr.getPublicKey(privKeyBytes);
  peerId = pubKeyHex.slice(0, 12);
  myNickname = randomName();
  document.getElementById('assigned-name-display').textContent = myNickname;
}

async function classifyDevice() {
  isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if ('gpu' in navigator && navigator.gpu) {
    try {
      const adapter = await navigator.gpu.requestAdapter();
      if (adapter) { hasWebGPU = true; availableVRAM = Math.floor((adapter.limits.maxBufferSize || 0)/1024/1024); }
    } catch(e){}
  }
  memoryMB = Math.round((navigator.deviceMemory || 2) * 1024);
  if (hasWebGPU && availableVRAM >= 5000) { deviceTier = "A"; myRole = "coder"; }
  else if (hasWebGPU && memoryMB >= 4096) { deviceTier = "B"; myRole = "creative"; }
  else if (hasWebGPU) { deviceTier = "C"; myRole = "fast_router"; }
  else { deviceTier = "D"; myRole = "relay"; }
  
  const tb = document.getElementById('device-tier-badge');
  if (tb) tb.textContent = `TIER ${deviceTier}`;
}

function updateRelayUI() {
  let ok = 0;
  for (const [, r] of relayMap) { if (r.status === 'connected') ok++; }
  const st = document.getElementById('h-status');
  if (st) {
    st.textContent = ok > 0 ? `● conectando bosque · ${ok} relays` : '● offline';
    st.style.color = ok > 0 ? 'var(--accent)' : 'rgba(255,255,255,0.4)';
  }
}

function connectToRelays() {
  CONFIG.nostrCoreRelays.forEach(url => {
    relayMap.set(url, { ws: null, status: 'connecting' });
    try {
      const ws = new WebSocket(url);
      relayMap.get(url).ws = ws;
      ws.onopen = () => {
        relayMap.get(url).status = 'connected';
        updateRelayUI();
        // subscribe
        const since = Math.floor(Date.now()/1000) - 600;
        ws.send(JSON.stringify(["REQ", `sub-${peerId}`, { kinds:[1], "#t":[CONFIG.appNamespace], since }]));
      };
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg[0] === 'EVENT' && !seenEventIds.has(msg[2].id)) {
            seenEventIds.add(msg[2].id);
            const c = JSON.parse(msg[2].content);
            if (c && c.peerId !== peerId) handleNetworkEvent(c);
          }
        } catch(err){}
      };
      ws.onclose = () => { relayMap.get(url).status = 'disconnected'; updateRelayUI(); };
    } catch(e){}
  });
}

function handleNetworkEvent(c) {
  // Simplificado para la demostración
  if (c.type === "chat") {
    if (c.payload && c.payload.role === 'pudu_notice') {
       showPuduCinematic({ notice: `${c.payload.requester} llamó a Pudu...` });
    } else if (c.payload && c.payload.role === 'pudu_event') {
       showPuduCinematic({ text: c.payload.text });
    } else {
       addMessageToUI(c.role || 'user', c.content || '');
    }
  }
}

async function initEngine() {
  if (deviceTier === 'D') return; // Sin motor local
  try {
    const modelCfg = CONFIG.models.find(m => m.tier === deviceTier) || CONFIG.models[0];
    const worker = createWorker();
    engine = await webllm.CreateWebWorkerMLCEngine(worker, modelCfg.id, {
      initProgressCallback: p => console.log('Engine load:', p.text)
    });
    currentModelId = modelCfg.id;
    currentModelLabel = modelCfg.label;
    console.log("Motor cargado!");
  } catch(e) { console.warn("Fallo carga motor:", e); }
}

async function invokePuduSummon(prompt) {
  showPuduCinematic({ notice: "Consultando el bosque..." });
  
  let resultText = "Lo siento, la red está dormida o no hay GPUs activas en este bosque.";
  
  if (engine) {
    try {
      const msgs =[{role:"system", content:"Eres Pudú, espíritu del bosque chileno. Responde breve y poético."}, {role:"user", content: prompt}];
      let fullResponse = "";
      const chunks = await engine.chat.completions.create({ messages: msgs, stream: true, max_tokens: 100 });
      for await (const chunk of chunks) {
        const token = chunk.choices[0]?.delta?.content || "";
        fullResponse += token;
        const caption = document.getElementById('pudu3d-caption');
        if (caption && puduOnScreen) caption.textContent = fullResponse.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
      }
      resultText = fullResponse;
    } catch(e) {}
  } else {
    // Si no hay motor, usamos la nube pública temporal (Fallback de v7)
    try {
       const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?system=Eres%20un%20Pudu%20chileno.%20Responde%20breve.`);
       resultText = await res.text();
    } catch(e){}
  }
  
  const clean = resultText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
  showPuduCinematic({ text: clean });
  addMessageToUI('assistant', clean);
}

let bgRenderer, bgScene, bgCam, bgShapes =[];
function initBg() {
  const canvas = document.getElementById('three-canvas');
  bgRenderer = new THREE.WebGLRenderer({canvas, alpha:true});
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
  bgScene = new THREE.Scene();
  bgCam = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 600);
  bgCam.position.set(0, 4.8, 18);
  
  const geos =[new THREE.OctahedronGeometry(0.3), new THREE.TetrahedronGeometry(0.25)];
  const cols =['#00e5ff','#b16bff','#4ade80','#ffd700'];
  for(let i=0; i<40; i++) {
    const mesh = new THREE.Mesh(geos[i%2], new THREE.MeshBasicMaterial({color:cols[i%cols.length], wireframe:true, transparent:true, opacity:0.5}));
    mesh.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, (Math.random()-0.5)*15);
    mesh.userData = { vy: (Math.random()-0.5)*0.02, rx: Math.random()*0.02 };
    bgScene.add(mesh);
    bgShapes.push(mesh);
  }
  
  function anim() {
    requestAnimationFrame(anim);
    bgShapes.forEach(s => {
      s.position.y += s.userData.vy;
      s.rotation.x += s.userData.rx;
      s.rotation.y += s.userData.rx;
      if(s.position.y > 10) s.position.y = -10;
    });
    bgRenderer.render(bgScene, bgCam);
  }
  anim();
}
setTimeout(initBg, 500);

// Audio FX
function playTone(f,d) {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = ac.createGain(); g.gain.setValueAtTime(0.1, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime+d);
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
  } catch(e){}
}

function playMsgReceive() { playTone(523, 0.15); }
