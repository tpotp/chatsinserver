const WORKER_CODE = `
import { WebWorkerMLCEngineHandler } from "https://esm.run/@mlc-ai/web-llm";
const handler = new WebWorkerMLCEngineHandler();
self.onmessage = (msg) => { handler.onmessage(msg); };
`;
function createWorker() {
  const blob = new Blob([WORKER_CODE], { type: "text/javascript" });
  return new Worker(URL.createObjectURL(blob), { type: "module" });
}

    { id: "Llama-3.2-1B-Instruct-q4f16_1-MLC", name: "1B-q4", label: "small", vramMB: 900, ramMB: 1200, modelSize: 1000, tier: "B", roles: ["creative", "general"] },
    { id: "Llama-3.2-3B-Instruct-q4f16_1-MLC", name: "3B-q4", label: "medium", vramMB: 2200, ramMB: 3000, modelSize: 3000, tier: "B", roles:["creative", "general"] },

const MSG = {
  HELLO: 1, TOK_REQ: 2, TOK_RES: 3, TOK_CHUNK: 4, TOK_END: 5,
  PING: 0x10, PONG: 0x11, CHAT: 0x20, MOE_REQ: 0x50, MOE_RES: 0x51
};

function encodeMsg(type, reqId, seq, payload) {
  const pb = payload ? new TextEncoder().encode(JSON.stringify(payload)) : new Uint8Array(0);
  const buf = new ArrayBuffer(7 + pb.length);
  const dv = new DataView(buf);
  dv.setUint8(0, type); dv.setUint32(1, reqId); dv.setUint16(5, seq);
  if (pb.length) new Uint8Array(buf, 7).set(pb);
  return buf;
}
function decodeMsg(buf) {
  const dv = new DataView(buf);
  const type = dv.getUint8(0), reqId = dv.getUint32(1), seq = dv.getUint16(5);
  let payload = null;
  if (buf.byteLength > 7) try { payload = JSON.parse(new TextDecoder().decode(new Uint8Array(buf, 7))); } catch(e) {}
  return { type, reqId, seq, payload };
}

const ROOM_CAPACITY = 15;

// Maps the old addMessageToUI to the new V12 styling
function addMessageToUI(role, content, streaming = false) {
  const isUser = role === 'user';
  const c = document.getElementById('chat-messages');
  
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'me' : 'other'}`;
  
  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = isUser ? myNickname : (role === 'assistant' ? 'Pudú Colmena' : role);
  
  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'msg-body';
  
  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  
  if (streaming) {
     bub.innerHTML = `<span class="msg-content"></span><div class="typing-indicator" style="display:inline-block; margin-left:8px;"><span style="display:inline-block;width:6px;height:6px;background:#fff;border-radius:50%;margin:0 2px;animation:dotBounce 1s infinite"></span><span style="display:inline-block;width:6px;height:6px;background:#fff;border-radius:50%;margin:0 2px;animation:dotBounce 1s infinite 0.2s"></span><span style="display:inline-block;width:6px;height:6px;background:#fff;border-radius:50%;margin:0 2px;animation:dotBounce 1s infinite 0.4s"></span></div>`;
  } else {
     bub.innerHTML = `<span class="msg-content">${escapeHtml(content || '').replace(/\n/g, '<br>')}</span>`;
  }
  
  const meta = document.createElement('div');
  meta.className = 'msg-time msg-meta';
  
  bodyWrap.appendChild(bub);
  row.appendChild(sender);
  row.appendChild(bodyWrap);
  row.appendChild(meta);

  c.scrollTop = c.scrollHeight;
  
  if (!streaming && content) {
    if (isUser) { try{ playSendSound(); } catch(e){} }
    else { try{ playMsgReceive(); } catch(e){} }
  }
  
  return row; // The script uses .querySelector('.msg-content') on this return
}

// Audio FX
function playTone(f,d) {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = ac.createGain(); g.gain.setValueAtTime(0.1, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime+d);
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
  } catch(e){}
}
function playSendSound() { playTone(880, 0.1); }
function playMsgReceive() { playTone(523, 0.15); }

function buildProceduralPudu() {
  const root = new THREE.Group();
  const P = {};

async function initPudu3D() {

  pudu3dCamera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  pudu3dCamera.position.set(0, 1.5, 6);
  
  pudu3dModel = buildProceduralPudu();
  pudu3dScene.add(pudu3dModel);
  pudu3dClock = new THREE.Clock();
  pudu3dLoaded = true;
}

function runPudu3DLoop() {
  if (!pudu3dRunning) return;
  requestAnimationFrame(runPudu3DLoop);
  const t = pudu3dClock.getElapsedTime();
  if (pudu3dModel && puduParts.head) {
    pudu3dModel.position.y = -0.2 + Math.sin(t * 2) * 0.05;
    puduParts.head.rotation.z = Math.sin(t * 3) * 0.1;
  }
  pudu3dRenderer.render(pudu3dScene, pudu3dCamera);
}

function lerp(a,b,t) { return a+(b-a)*t; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }

// Proxies the old showPuduInvocationOverlay to the 3D cinematic
window.showPuduCinematic = async function(payload) {
  if (!pudu3dLoaded) await initPudu3D();
  if (!pudu3dModel) return;

  const overlay = document.getElementById('pudu3d-overlay');
  const caption = document.getElementById('pudu3d-caption');
  const vignette = document.getElementById('pudu3d-vignette');
  
  if (!puduOnScreen) {
    puduOnScreen = true;
    overlay.style.display = 'block';
    pudu3dModel.position.set(-10, -0.2, 0);
    pudu3dRunning = true;
    pudu3dClock.start();
    runPudu3DLoop();
    
    const start = performance.now();
    await new Promise(r => {
      function step(now) {
        const p = Math.min((now - start)/1200, 1);
        pudu3dModel.position.x = lerp(-10, 0, easeOut(p));
        if (p<1) requestAnimationFrame(step); else r();
      }
      requestAnimationFrame(step);
    });
    caption.style.opacity = 1;
    vignette.style.opacity = 0.7;
  }
  
  if (payload.text) {
    const cleanText = payload.text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
    caption.textContent = cleanText;
    
    clearTimeout(puduLeaveTimer);
    puduLeaveTimer = setTimeout(async () => {
      caption.style.opacity = 0;
      vignette.style.opacity = 0;
      const start = performance.now();
      await new Promise(r => {
        function step(now) {
          const p = Math.min((now - start)/1000, 1);
          pudu3dModel.position.x = lerp(0, 10, p*p*p);
          if (p<1) requestAnimationFrame(step); else r();
        }
        requestAnimationFrame(step);
      });
      overlay.style.display = 'none';
      puduOnScreen = false;
      pudu3dRunning = false;
    }, Math.min(15000, 3000 + cleanText.length * 40));
  } else if (payload.notice) {
    caption.textContent = payload.notice;
    clearTimeout(puduLeaveTimer);
  }
}
window.showPuduInvocationOverlay = window.showPuduCinematic;

async function initIdentity() {
  try {
    nostrMod = await import("https://esm.sh/nostr-tools@2/pure");
    privKeyBytes = nostrMod.generateSecretKey();
    pubKeyHex = nostrMod.getPublicKey(privKeyBytes);
    peerId = pubKeyHex.slice(0, 12);
    myNickname = randomName();
    document.getElementById('assigned-name-display').textContent = myNickname;
  } catch(e) {
    throw new Error("No se pudo cargar criptografía Nostr");
  }
}

async function classifyDevice() {
  isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if ('gpu' in navigator && navigator.gpu) {
    try {
      // VITAL FIX: Promise.race to prevent infinite hang on requestAdapter
      const adapter = await Promise.race([
        navigator.gpu.requestAdapter({ powerPreference: 'high-performance' }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
      ]);
      if (adapter) { 
        hasWebGPU = true; 
        availableVRAM = Math.floor((adapter.limits.maxBufferSize || 0)/1024/1024); 
      }
    } catch(e){ console.log("WebGPU fallback"); }
  }
  memoryMB = Math.round((navigator.deviceMemory || 2) * 1024);
  if (hasWebGPU && availableVRAM >= 5000) { deviceTier = "A"; myRole = "coder"; }
  else if (hasWebGPU && memoryMB >= 4096) { deviceTier = "B"; myRole = "creative"; }
  else if (hasWebGPU) { deviceTier = "C"; myRole = "fast_router"; }
  else { deviceTier = "D"; myRole = "relay"; }
  
  const tb = document.getElementById('device-tier-badge');
  if (tb) tb.textContent = `TIER ${deviceTier}`;
}

function updateRelayUI() {
  let ok = 0;
  for (const [, r] of relayMap) { if (r.status === 'connected') ok++; }
  const st = document.getElementById('h-status');
  if (st) {
    st.textContent = ok > 0 ? `● conectando bosque · ${ok} relays` : '● offline';
    st.style.color = ok > 0 ? 'var(--accent)' : 'rgba(255,255,255,0.4)';
  }
}

function updateRoomMembersUI() {
  let c = 1; 
  for (const [, p] of peers) { if (p.dc?.readyState === 'open' || (Date.now() - p.lastSeen < CONFIG.presenceTTLMs)) c++; }
  const tag = document.getElementById('h-room-tag');
  if (tag) tag.textContent = `🌿 SALA 1 · ${c}/${ROOM_CAPACITY}`;
}

function connectToRelays() {
  CONFIG.nostrCoreRelays.forEach(url => {
    relayMap.set(url, { ws: null, status: 'connecting' });
    try {
      const ws = new WebSocket(url);
      relayMap.get(url).ws = ws;
      ws.onopen = () => {
        relayMap.get(url).status = 'connected';
        updateRelayUI();
        const since = Math.floor(Date.now()/1000) - 600;
        ws.send(JSON.stringify(["REQ", `sub-${peerId}`, { kinds:[1], "#t":[CONFIG.appNamespace], since }]));
        publishPresence();
      };
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg[0] === 'EVENT' && !seenEventIds.has(msg[2].id)) {
            seenEventIds.add(msg[2].id);
            const c = JSON.parse(msg[2].content);
            if (c && c.peerId !== peerId && c.from !== peerId) handleNetworkEvent(c);
          }
        } catch(err){}
      };
      ws.onclose = () => { relayMap.get(url).status = 'disconnected'; updateRelayUI(); };
    } catch(e){}
  });
}

function publishPresence() {
  if(!nostrMod || !privKeyBytes) return;
  const content = {
    type: "presence", peerId, deviceTier, webgpu: hasWebGPU, memoryMB, tps: localTPS,
    currentModel: currentModelId, moeRole: myRole, hasEngine: !!engine, timestamp: Date.now(),
    nickname: myNickname
  };
  const event = nostrMod.finalizeEvent({ kind: 1, created_at: Math.floor(Date.now() / 1000), tags: [["t", CONFIG.appNamespace]], content: JSON.stringify(content) }, privKeyBytes);
  seenEventIds.add(event.id);
  const raw = JSON.stringify(["EVENT", event]);
  for (const [, entry] of relayMap) { if (entry.ws?.readyState === 1) { try { entry.ws.send(raw); } catch(e) {} } }
}

function publishSignal(targetId, signal, fromVirtualId = null) { 
  if(!nostrMod || !privKeyBytes) return;
  const fromPrivKey = fromVirtualId ? masqueradedPeers.get(fromVirtualId)?.privKey : privKeyBytes;
  const fromId = fromVirtualId || peerId;
  const event = nostrMod.finalizeEvent({ kind: 1, created_at: Math.floor(Date.now() / 1000), tags: [["t", CONFIG.appNamespace]], content: JSON.stringify({ type: "signal", from: fromId, to: targetId, signal, timestamp: Date.now() }) }, fromPrivKey);
  const raw = JSON.stringify(["EVENT", event]);
  for (const [, entry] of relayMap) { if (entry.ws?.readyState === 1) { try { entry.ws.send(raw); } catch(e) {} } }
}

function handleNetworkEvent(c) {
  if (c.type === "presence") {
    if (!peers.has(c.peerId)) {
      peers.set(c.peerId, { ...c, lastSeen: Date.now(), dc: null, conn: null });
      if (peerId < c.peerId) initiateWebRTC(c.peerId);
      updateRoomMembersUI();
    } else {
      const p = peers.get(c.peerId);
      Object.assign(p, c, { lastSeen: Date.now() });
    }
  } else if (c.type === "signal" && (c.to === peerId || masqueradedPeers.has(c.to))) {
    const virtualId = masqueradedPeers.has(c.to) ? c.to : null;
    if (c.signal.type === "moe_fallback_req") handleNostrFallbackReq(c.from, c.signal, virtualId);
    else if (c.signal.type === "moe_fallback_res") handleNostrFallbackRes(c.from, c.signal);
    else handleWebRTCSignal(c.from, c.signal, virtualId);
  }
}

// ── WebRTC ──
const ICE_SERVERS =[{ urls: "stun:stun.l.google.com:19302" },{ urls: "stun:stun.cloudflare.com:3478" }];
function createPeerConn(targetId, myVirtualId = null) {
  const conn = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  let iceBatch =[], iceTimer = null;
  conn.onicecandidate = (e) => { if (!e.candidate) return; iceBatch.push(e.candidate.toJSON()); clearTimeout(iceTimer); iceTimer = setTimeout(() => { if (!iceBatch.length) return; publishSignal(targetId, { type: "candidates", candidates: [...iceBatch] }, myVirtualId); iceBatch =[]; }, 200); };
  return conn;
}

function initiateWebRTC(targetId) {
  let peer = peers.get(targetId);
  if (peer?.conn && ['connecting','connected'].includes(peer.conn.connectionState)) return;
  const conn = createPeerConn(targetId); peer.conn = conn;
  const dc = conn.createDataChannel("p2p", { ordered: true }); peer.dc = dc; setupDC(dc, targetId);
  conn.createOffer().then(o => conn.setLocalDescription(o)).then(() => publishSignal(targetId, { type:"offer", sdp: conn.localDescription })).catch(e=>{});
}

async function handleWebRTCSignal(fromId, signal, myVirtualId = null) {
  if (myVirtualId) {
    const vp = masqueradedPeers.get(myVirtualId);
    let rConn = vp.connections.get(fromId);
    if (!rConn) { rConn = { conn: null, dc: null }; vp.connections.set(fromId, rConn); }
    if (signal.type === "offer") {
      const conn = createPeerConn(fromId, myVirtualId); rConn.conn = conn;
      conn.ondatachannel = (e) => { rConn.dc = e.channel; setupDC(e.channel, fromId, myVirtualId); };
      try { await conn.setRemoteDescription(new RTCSessionDescription(signal.sdp)); const ans = await conn.createAnswer(); await conn.setLocalDescription(ans); publishSignal(fromId, { type:"answer", sdp: conn.localDescription }, myVirtualId); } catch(e) {}
    } else if (signal.type === "answer" && rConn.conn) {
      try { await rConn.conn.setRemoteDescription(new RTCSessionDescription(signal.sdp)); } catch(e) {}
    } else if ((signal.type === "candidate" || signal.type === "candidates") && rConn.conn) {
      const candidates = signal.candidates || (signal.candidate ? [signal.candidate] :[]);
      for (const c of candidates) { try { await rConn.conn.addIceCandidate(new RTCIceCandidate(c)); } catch(_) {} }
    }
    return;
  }

  let peer = peers.get(fromId);
  if (!peer) { peer = { lastSeen:Date.now(), conn:null, dc:null }; peers.set(fromId,peer); }
  if (signal.type === "offer") {
    if (peer.conn && ['connecting','connected'].includes(peer.conn.connectionState) && peerId > fromId) return;
    const conn = createPeerConn(fromId); peer.conn = conn;
    conn.ondatachannel = (e) => { peer.dc = e.channel; setupDC(e.channel, fromId); };
    try { await conn.setRemoteDescription(new RTCSessionDescription(signal.sdp)); const ans = await conn.createAnswer(); await conn.setLocalDescription(ans); publishSignal(fromId, { type:"answer", sdp: conn.localDescription }); } catch(e) {}
  } else if (signal.type === "answer" && peer.conn) {
    try { await peer.conn.setRemoteDescription(new RTCSessionDescription(signal.sdp)); } catch(e) {}
  } else if ((signal.type === "candidate" || signal.type === "candidates") && peer.conn) {
    const candidates = signal.candidates || (signal.candidate ? [signal.candidate] :[]);
    for (const c of candidates) { try { await peer.conn.addIceCandidate(new RTCIceCandidate(c)); } catch(_) {} }
  }
}

function setupDC(dc, remoteId, myVirtualId = null) {
  dc.binaryType = "arraybuffer";
  dc.onopen = () => {
    if (!myVirtualId) {
      const peer = peers.get(remoteId);
      if (peer) addSystemMsgVS(roomName, `🌿 Conexión WebRTC P2P directa con ${peer.nickname || remoteId.slice(0,6)}`);
    }
  };
  dc.onmessage = (e) => { handleBinMsg(remoteId, e.data, myVirtualId, dc); };
}

async function handleBinMsg(fromId, buf, myVirtualId = null, dc = null) {
  const m = decodeMsg(buf); 
  
  if (myVirtualId) {
    const vp = masqueradedPeers.get(myVirtualId);
    const rConn = vp.connections.get(fromId);
    if (m.type === MSG.MOE_REQ || m.type === MSG.TOK_REQ) {
       if (engine && m.payload?.messages) {
          try {
             const chunks = await engine.chat.completions.create({ messages: m.payload.messages, stream: true, temperature: 0.7, max_tokens: 200 });
             let fullR = "", seqC = 0;
             for await (const chunk of chunks) { const token = chunk.choices[0]?.delta?.content || ""; fullR += token; if (token && rConn?.dc?.readyState === "open") rConn.dc.send(encodeMsg(MSG.TOK_CHUNK, m.reqId, seqC++, { token })); }
             if (rConn?.dc?.readyState === "open") rConn.dc.send(encodeMsg(MSG.TOK_END, m.reqId, seqC, { text: fullR, model: currentModelId }));
         } catch(e) {}
       }
    }
    return;
  }

  const peer = peers.get(fromId); if (!peer) return;
  switch(m.type) {
    case MSG.CHAT:
      if (m.payload?.id && !seenMsgIds.has(m.payload.id)) {
        seenMsgIds.add(m.payload.id);
        const { id, role, content, nickname } = m.payload;
        if (role === 'pudu_notice') showPuduCinematic({ notice: `${nickname} llamó a Pudu...` });
        else if (role === 'pudu_event') showPuduCinematic({ text: content });
        else addMessageToUI(role, content);
      }
      break;
    case MSG.TOK_CHUNK:
      if (m.payload && fedPending.has(m.reqId)) fedPending.get(m.reqId).onChunk?.(m.payload.token);
      break;
    case MSG.TOK_RES:
    case MSG.TOK_END:
    case MSG.MOE_RES:
      if (m.payload && fedPending.has(m.reqId)) { 
        const { resolve } = fedPending.get(m.reqId); 
        fedPending.delete(m.reqId); 
        resolve(m.payload); 
      }
      break;
    case MSG.MOE_REQ:
      if (engine && m.payload?.messages) {
        if (isGenerating) break;
        isGenerating = true;
        try {
          const chunks = await engine.chat.completions.create({ messages: m.payload.messages, stream: true, temperature: 0.7, max_tokens: 200 });
          let fullR = "", seqC = 0;
          for await (const chunk of chunks) { const token = chunk.choices[0]?.delta?.content || ""; fullR += token; if (token && peer.dc?.readyState === "open") peer.dc.send(encodeMsg(MSG.TOK_CHUNK, m.reqId, seqC++, { token })); }
          if (peer.dc?.readyState === "open") peer.dc.send(encodeMsg(MSG.TOK_END, m.reqId, seqC, { text: fullR, model: currentModelId }));
        } catch(e) {}
        isGenerating = false;
      }
      break;
  }
}

// ── Inferencia y Ruteo ──
function broadcastChat(role, content, senderId, msgId = null) {
  const id = msgId || uid(); seenMsgIds.add(id);
  const payload = { id, role, content, peerId: senderId, nickname: myNickname };
  const raw = encodeMsg(MSG.CHAT, 0, 0, payload);
  for (const [pid, p] of peers) { if (p.dc?.readyState === 'open') { try { p.dc.send(raw); } catch(e) {} } }
}

async function handleNostrFallbackReq(fromId, signal, virtualId = null) {
  if (!engine) return;
  const reqId = signal.reqId;
  isGenerating = true;
  try {
    const res = await engine.chat.completions.create({ messages: signal.messages, stream: false, max_tokens: signal.max_tokens || 200 });
    let text = res.choices[0]?.message?.content || "";
    if (virtualId) {
      const vnick = masqueradedPeers.get(virtualId)?.nickname || virtualId;
      text += `\n\n> ✅ *Colmena Simulada: ${vnick}*`;
    }
    publishSignal(fromId, { type: "moe_fallback_res", reqId, payload: { text, model: currentModelId }}, virtualId);
  } catch(e){}
  isGenerating = false;
}

function handleNostrFallbackRes(fromId, signal) {
  const reqId = signal.reqId;
  if (signal.payload && fedPending.has(reqId)) {
    const { resolve } = fedPending.get(reqId);
    fedPending.delete(reqId);
    resolve(signal.payload);
  }
}

async function invokePuduSummon(prompt) {

      const result = await new Promise((resolve, reject) => {
        const to = setTimeout(() => { fedPending.delete(reqId); reject(); }, 30000);
        fedPending.set(reqId, {
          resolve: (res) => { clearTimeout(to); resolve(res); },
          onChunk: (t) => { if(t) { fullResponse+=t; contentEl.textContent=fullResponse; document.getElementById('chat-messages').scrollTop = 99999;} }
        });
        p.dc.send(encodeMsg(MSG.MOE_REQ, reqId, 0, { messages, max_tokens: 150 }));
      });

      aiMsgEl.querySelector('.msg-body').appendChild(pill);
    } catch(e) { fullResponse = "La conexión con el bosque se perdió."; contentEl.textContent = fullResponse; }

  else {

      // Pick a random simulated peer
      const vps = Array.from(masqueradedPeers.keys());
      const target = vps[Math.floor(Math.random() * vps.length)];
      
      const result = await new Promise(resolve => {
        const to = setTimeout(() => { fedPending.delete(reqId); resolve({text:"El bosque está en silencio."}); }, 40000);
        fedPending.set(reqId, { resolve: (res) => { clearTimeout(to); resolve(res); } });
        publishSignal(target, { type: "moe_fallback_req", reqId, messages, max_tokens: 150 });
      });
      fullResponse = result.text;
      contentEl.textContent = fullResponse;
    } else {
      fullResponse = "No hay nodos con motor activos. Escribe /colmena 10 para simular la red.";
      contentEl.textContent = fullResponse;
    }
  }
  
  aiMsgEl.querySelector('.typing-indicator')?.remove();
  const clean = fullResponse.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
  showPuduCinematic({ text: clean });
  chatHistory.push({role:"assistant", content: clean});
  broadcastChat('pudu_event', clean, peerId);
}

  const PHONES =[
    { brand:'Samsung-A14', city:'Santiago', ram:3072, tps:0.8, tier:'C' },
    { brand:'iPhone-15', city:'Arica', ram:6144, tps:5.0, tier:'B' },
    { brand:'MacStudio', city:'Valdivia', ram:32000, tps:25.0, tier:'S' },
  ];

  for(let i=0; i<n; i++) {
    const base = PHONES[i % PHONES.length];
    const priv = nostrMod.generateSecretKey();
    const pub = nostrMod.getPublicKey(priv);
    const pid = pub.slice(0,12);
    masqueradedPeers.set(pid, {
      privKey:priv, pubKey:pub, deviceTier:base.tier, webgpu:base.ram>=6144,
      memoryMB:base.ram, tps:base.tps, hasEngine:true,
      nickname:`${base.brand}-${base.city}`, connections:new Map()
    });
    
    // Inyectamos como peer visible
    peers.set(pid, {
      deviceTier:base.tier, webgpu:base.ram>=6144, memoryMB:base.ram, tps:base.tps, hasEngine:true,
      moeRole:'general', inferenceMode:'local', lastSeen:Date.now(), rtt:Math.floor(Math.random()*80)+10,
      conn:null, dc:null, nickname:`${base.brand}-${base.city}`
    });
    
    if(i < 10) simLog(`  + ${base.brand}-${base.city} (${pid}) → Tier ${base.tier} · PoC: ${base.tps} t/s`, 'sim-info');
  }
  if (n > 10) simLog(`... y ${n-10} nodos más.`, 'sim-info');
  
  updateRoomMembersUI();
  simLog(`\n✅ Cobertura virtual activa. Pide algo a @pudu para probar el ruteo.`, 'sim-pass');
}

// ══════════════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════════════
async function boot() {
  updateInitStatus("Generando identidad (Nostr)...");
  await initIdentity();
  
  updateInitStatus("Clasificando hardware...");
  await classifyDevice();
  
  updateInitStatus("Conectando relays...");
  connectToRelays();
  
  if (deviceTier !== 'D') {
    updateInitStatus("Descargando motor IA (WebLLM)...");
    try {
      webllm = await import("https://esm.run/@mlc-ai/web-llm");
      const modelCfg = CONFIG.models.find(m => m.tier === deviceTier) || CONFIG.models[0];
      const worker = createWorker();
      engine = await webllm.CreateWebWorkerMLCEngine(worker, modelCfg.id, {
        initProgressCallback: p => {
          updateInitStatus(`Cargando cerebro: ${Math.round(p.progress*100)}%`);
        }
      });
      currentModelId = modelCfg.id;
      currentModelLabel = modelCfg.label;
    } catch(e) { console.warn("Motor falló", e); }
  }
  
  // Transition to chat
  document.getElementById('connecting-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  addSystemMsgVS(roomName, `🌿 Entraste al bosque como ${myNickname} 🦌`);
  updateRoomMembersUI();
  
  setInterval(publishPresence, CONFIG.presenceTTLMs / 2);
}

// Bind to window to allow the HTML button to trigger it
window.enterChat = async function() {
  show('connecting-screen');
  try {
    await boot();
  } catch (e) {
    updateInitStatus(`Error: ${e.message}`);
    console.error(e);
  }
};

// Bind chat inputs
document.getElementById('send-btn').addEventListener('click', async () => {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || isGenerating) return;
  inp.value = '';
  
  if (text.startsWith('/colmena')) {
    addMessageToUI('user', text);
    const n = parseInt(text.split(' ')[1]) || 10;
    await startColmenaChile(n);
    return;
  }
  
  addMessageToUI('user', text);
  chatHistory.push({role:"user", content: text});
  broadcastChat('user', text, peerId);
  
  if (/(^|\s)@pudu\b/i.test(text)) {
    isGenerating = true;
    await invokePuduSummon(text.replace(/@pudu/gi, '').trim() || 'Hola bosque');
    isGenerating = false;
  }
});

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
});

// Init Three.js Background
let bgRenderer, bgScene, bgCam, bgShapes =[];
function initBg() {
  const canvas = document.getElementById('three-canvas');
  bgRenderer = new THREE.WebGLRenderer({canvas, alpha:true});
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
  bgScene = new THREE.Scene();
  bgCam = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 600);
  bgCam.position.set(0, 4.8, 18);
  
  const geos =[new THREE.OctahedronGeometry(0.3), new THREE.TetrahedronGeometry(0.25)];
  const cols =['#00e5ff','#b16bff','#4ade80','#ffd700'];
  for(let i=0; i<40; i++) {
    const mesh = new THREE.Mesh(geos[i%2], new THREE.MeshBasicMaterial({color:cols[i%cols.length], wireframe:true, transparent:true, opacity:0.5}));
    mesh.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, (Math.random()-0.5)*15);
    mesh.userData = { vy: (Math.random()-0.5)*0.02, rx: Math.random()*0.02 };
    bgScene.add(mesh);
    bgShapes.push(mesh);
  }
  
  function anim() {
    requestAnimationFrame(anim);
    bgShapes.forEach(s => {
      s.position.y += s.userData.vy;
      s.rotation.x += s.userData.rx;
      s.rotation.y += s.userData.rx;
      if(s.position.y > 10) s.position.y = -10;
    });
    bgRenderer.render(bgScene, bgCam);
  }
  anim();
  
  window.addEventListener('resize', () => {
    bgRenderer.setSize(window.innerWidth, window.innerHeight);
    bgCam.aspect = window.innerWidth / window.innerHeight;
    bgCam.updateProjectionMatrix();
  });
}
setTimeout(initBg, 100);
